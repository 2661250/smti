<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMTI 人格测试</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary-color: #a0a0a0;
            --primary-color: #E53935; /* A strong red */
            --primary-color-light: #ff6f60;
            --border-color: #333333;
            --hover-color: #2a2a2a;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            transition: all 0.3s ease-in-out;
        }

        .screen {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: var(--card-color);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 40px;
            box-shadow: 0 4px 20px var(--shadow-color);
            margin-bottom: 25px;
        }

        /* Start Screen */
        #start-screen {
            text-align: center;
        }

        #start-screen h1 {
            font-size: 2.8em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        #start-screen p {
            font-size: 1.1em;
            line-height: 1.8;
            color: var(--text-secondary-color);
            margin-bottom: 35px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            background-image: linear-gradient(to right, var(--primary-color), var(--primary-color-light));
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(229, 57, 53, 0.4);
        }

        /* Quiz Screen */
        #progress-container {
            width: 100%;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.4s ease-in-out;
        }

        #question-header {
            font-size: 1.1em;
            color: var(--text-secondary-color);
            margin-bottom: 10px;
        }

        #question-text {
            font-size: 1.6em;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            min-height: 80px;
        }

        #options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: left;
            font-size: 1.05em;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
        }

        .option-btn:hover {
            background-color: var(--hover-color);
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        /* Result Screen */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .result-card-left {
            text-align: center;
            padding: 30px;
        }
        
        .result-card-left h2 {
            font-size: 1.2em;
            color: var(--text-secondary-color);
            font-weight: 500;
        }

        .result-card-left .result-name {
            font-size: 2.8em;
            font-weight: 700;
            margin: 10px 0;
            color: var(--primary-color);
        }

        .result-card-left .result-acronym {
            font-size: 2.2em;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .result-card-left .result-image {
            width: 80%;
            max-width: 200px;
            height: auto;
            margin: 0 auto;
            background-color: #2a2a2a;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }
        
        .result-card-right h3 {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text-secondary-color);
            margin-bottom: 5px;
        }

        .result-card-right .result-type-full {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .result-card-right .match-pill {
            display: inline-block;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .result-card-right .match-pill span {
            color: var(--primary-color);
            font-weight: 700;
        }

        .result-card-right .confidence-text {
            font-size: 1em;
            line-height: 1.7;
            color: var(--text-secondary-color);
        }

        .interpretation-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .interpretation-card p {
            font-size: 1.1em;
            line-height: 1.9;
            color: var(--text-secondary-color);
            white-space: pre-wrap;
        }

        .restart-btn-container {
            text-align: center;
            margin-top: 10px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { padding: 0; }
            .container { padding: 0; }
            .card { border-radius: 0; padding: 30px 20px; margin-bottom: 10px; border-left: 0; border-right: 0;}
            .result-grid { grid-template-columns: 1fr; }
            #start-screen h1 { font-size: 2.2em; }
            .result-card-left .result-name { font-size: 2.5em; }
            .result-card-right .result-type-full { font-size: 2em; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active card">
        <h1>SMTI人格测试</h1>
        <p>探索你未曾留意的处事风格与内在偏好，请放松并凭直觉选择。</p>
        <button class="btn" onclick="startQuiz()">开始测试</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="card">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="question-header"></div>
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <div class="result-grid">
            <div class="card result-card-left">
                <h2>你的人格类型是：</h2>
                <h1 id="result-name-short" class="result-name"></h1>
                <h3 id="result-acronym" class="result-acronym"></h3>
                <img id="result-image" src="" alt="人格插图" class="result-image">
            </div>
            <div class="card result-card-right">
                <h3>你的主类型</h3>
                <h2 id="result-type-full" class="result-type-full"></h2>
                <div class="match-pill">
                    人格匹配度: <span id="match-percentage"></span>
                </div>
                <p class="confidence-text">
                    该匹配度根据你的选项倾向性计算得出。数值越高，表明你的选择与该人格的核心特质越一致。
                </p>
            </div>
        </div>
        <div class="card interpretation-card">
            <h3>该人格的简单解读</h3>
            <p id="result-description"></p>
        </div>
        <div class="restart-btn-container">
            <button class="btn" onclick="restartQuiz()">再测一次</button>
        </div>
    </div>
</div>

        hannibal: { name: "汉尼拔", acronym: "HANNIBAL", description: `你是一位优雅的、拥有博士学位的“美食家”，而你的伴侣，就是你眼中最值得细细品味的珍馐。你的支配并非源于暴力，而是源于深刻的洞察力和心理剖析。你享受的，是像汉尼拔·莱克特一样，看穿对方的伪装，洞悉其内心最深处的恐惧与渴望。\n\n你的手段极其精妙，可能只是一句话、一个眼神，或是一种精心布置的氛围，就能让对方的心理防线层层瓦解。你对人体和感官的研究达到了学术级别，擅长用最文明的方式，制造最野蛮的战栗。你不是在玩SM，你是在进行一场关于人性弱点的艺术创作。`, imageUrl: `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzJhMmEyYSIvPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAtMTApIj48cGF0aCBkPSJNIDI1LDQwIEMgMjUsMjAgNzUsMjAgNzUsNDAgTCA3MCwxMDAgTCAzMCwxMDAgWiIgZmlsbD0iI2RkNmIyMCIvPjxwYXRoIGQ9Ik0gMjUsNDAgQyAyNSwyNSA3NSwyNSA3NSw0MCIgZmlsbD0iI2MwNTYyMSIvPjxwYXRoIGQ9Ik0gMzgsNDggQSA1IDUgMCAwIDEgNDIsNDgiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMiIvPjxwYXRoIGQ9Ik0gNTgsNDggQSA1IDUgMCAwIDEgNjIsNDgiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMiIvPjxwYXRoIGQ9Ik0gNDAsNjIgUSA1MCw2OCA2MCw2MiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIi8+PHJlY3QgeD0iMzAiIHk9IjcwIiB3aWR0aD0iNDAiIGhlaWdodD0iMjAiIGZpbGw9IiNlN2VhZTAiLz48cGF0aCBkPSJNIDMwLDcwIEwgMjUsOTAgTCA3NSw5MCBMIDcwLDcwIFoiIGZpbGw9IiNjNmQwZGUiLz48L2c+PC9zdmc+` },
        comedian: { name: "喜剧演员", acronym: "COMEDY", description: `对你来说，SM的“S”首先代表的是“Silly”（滑稽）。你是一个天生的喜剧演员，而施虐只是你众多表演形式中的一种。你热衷于设计各种充满戏剧性、甚至有点无厘头的“惩罚”环节，其核心目的不是为了让对方痛苦，而是为了看TA出糗的样子。\n\n你是最容易笑场的支配者，经常因为对方滑稽的求饶姿势、或者自己设计的道具太离谱而笑到岔气。你享受的是那种双方都心知肚明“这是在演戏”的默契感。如果一场互动下来，两个人的腹肌不是因为紧张，而是因为大笑而酸痛，那么在你看来，这就是最完美的演出。`, imageUrl: `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzJhMmEyYSIvPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAtMTApIj48cGF0aCBkPSJNIDI1LDQwIEMgMjUsMjAgNzUsMjAgNzUsNDAgTCA3MCwxMDAgTCAzMCwxMDAgWiIgZmlsbD0iIzMxODJjZSIvPjxwYXRoIGQ9Ik0gMjUsNDAgQyAyNSwyMCA3NSwyMCA3NSw0MCIgZmlsbD0iIzJiNmNiMCIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iNTAiIHI9IjQiIGZpbGw9IndoaXRlIi8+PGNpcmNsZSBjeD0iNjAiIGN5PSI1MCIgcj0iNCIgZmlsbD0id2hpdGUiLz48cGF0aCBkPSJNIDQwLDYwIEMgNDUsNzAgNTUsNzAgNjAsNjAiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMiIvPjwvZz48L3N2Zz4=` },
        emotionalNuke: { name: "情感核弹", acronym: "NUKE", description: `你是行走的“脏弹”，不以物理伤害见长，却能造成大范围的情感辐射污染。你的支配力源于你那极不稳定、极具爆发力的情绪核心。一旦进入状态，你会关闭所有理智的安全阀，将最原始的喜怒哀乐毫无保留地倾泻而出。\n\n你追求的不是循序渐进的调教，而是一场能让双方精神“系统崩溃”的情感风暴。你享受将伴侣的情绪推向极限，看着TA在你制造的极端情境中（可能是极度的恐惧，也可能是极度的感动）彻底失控、哭泣、崩溃。你坚信，只有在理智的废墟之上，才能建立最深刻、最牢固的情感链接。`, imageUrl: `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzJhMmEyYSIvPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAtMTApIj48cGF0aCBkPSJNIDI1LDQwIEMgMjUsMjAgNzUsMjAgNzUsNDAgTCA3MCwxMDAgTCAzMCwxMDAgWiIgZmlsbD0iI2U1M2UzZSIvPjxwYXRoIGQ9Ik0gMjUsNDAgQyAzNSw1IDY1LDUgNzUsNDAgTCA3MCwzNSBMIDMwLDM1IFoiIGZpbGw9IiNjNTMwMzAiLz48cGF0aCBkPSJNIDM1LDUyIEwgNDUsNDggTSA0MCw0NSBMIDQwLDU1IiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz48cGF0aCBkPSJNIDU1LDUyIEwgNjUsNDggTSA2MCw0NSBMIDYwLDU1IiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz48cGF0aCBkPSJNIDQwLDY4IFE1MCw2MCA2MCw2OCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsPSJub25lIi8+PC9nPjwvc3ZnPg==` },

        sensitiveDog: { name: "敏感狗", acronym: "SENSITIVE", description: `你的身体和情绪就像一台顶级的高精度科学仪器，能探测到最微弱的信号。无论是空气中暧昧的氛围，还是对方语气里一丝丝的变化，都足以在你的内心掀起波澜。你的皮肤是敏感的，泪腺是发达的，共情能力更是满格的。\n\n你很容易被感动，也很容易被“玩坏”。对你而言，体验的深度远比强度重要。你享受那种情绪被慢慢浸润、直至完全融化的过程。你的战栗和眼泪，并非软弱，而是对当前体验最真实、最珍贵的反馈。你就像一只警惕而又粘人的小狗，时刻感受着主人的喜怒，并以最直接的方式作出回应。`, imageUrl: `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzJhMmEyYSIvPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAtMTApIj48cGF0aCBkPSJNIDI1LDQwIEMgMjUsMjAgNzUsMjAgNzUsNDAgTCA3MCwxMDAgTCAzMCwxMDAgWiIgZmlsbD0iI2Y2ODdiMyIvPjxwYXRoIGQ9Ik0gMjUsNDAgQyAyNSwyNSA3NSwyNSA3NSw0MCIgZmlsbD0iI2I4MzI4MCIvPjxwYXRoIGQ9Ik0gMzUsNTAgQyAzMCw2MCA0NSw2MCw0MCw1MCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsPSJub25lIi8+PHBhdGggZD0iTSA1NSw1MCBDIDUwLDYwIDY1LDYwIDYwLDUwIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNIDQ1LDY1IFE1MCw2MCA1NSw2NSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsPSJub25lIi8+PC9nPjwvc3ZnPg==` },

        {"question":"以下哪种夸奖更能让你开心？","options":[{"text":"“你真是个天才/疯子！”","scores":{"dungeonMaestro":2,"emotionalNuke":1}},{"text":"“你真可爱/真好欺负。”","scores":{"rebelDog":1,"brattyDog":2}},{"text":"“你真乖/真听话。”","scores":{"goodDog":2}}]},
        {"question":"面对规则，你的态度是？","options":[{"text":"规则是用来打破的。","scores":{"rebelDog":2,"riotConductor":1}},{"text":"规则是用来利用的。","scores":{"trollTyrant":1,"brattyDog":2}},{"text":"规则是用来遵守的。","scores":{"hrHellraiser":1,"goodDog":2}}]},
        {"question":"在一段关系中，你更害怕？","options":[{"text":"无聊，一成不变的重复。","scores":{"dungeonMaestro":2,"wildDog":1}},{"text":"冲突，剑拔弩张的紧张氛围。","scores":{"goodDog":1,"sensitiveDog":2}},{"text":"失去掌控，事情的发展超出了你的预期。","scores":{"hrHellraiser":2,"hannibal":1}}]},
        {"question":"你的表达方式更接近？","options":[{"text":"直接、坦率，甚至有些不近人情。","scores":{"riotConductor":1,"painAccountant":2}},{"text":"委婉、细腻，善于通过暗示和氛围来传递信息。","scores":{"hannibal":2,"sensitiveDog":2}},{"text":"夸张、戏剧化，充满了强烈的情感色彩。","scores":{"emotionalNuke":2,"loudDog":1}}]},
        {"question":"什么样的人最吸引你？","options":[{"text":"强大、自信、能为你提供绝对秩序和安全感的人。","scores":{"goodDog":2,"toughDog":1}},{"text":"有趣、狡黠、能看穿你的小把戏并陪你玩的人。","scores":{"comedian":1,"trollTyrant":2}},{"text":"敏感、脆弱、能被你轻易“掌控”和“玩弄”于股掌之间的人。","scores":{"hannibal":1,"riotConductor":2}}]},
        {"question":"最后，你认为这一切的最终目的是？","options":[{"text":"体验极致的情感释放与灵魂共振。","scores":{"emotionalNuke":1,"cravingDog":2}},{"text":"一场心照不宣、充满智慧与趣味的成人游戏。","scores":{"comedian":1,"trollTyrant":2}},{"text":"建立一种牢不可破的、基于绝对信任与依赖的深刻联结。","scores":{"hrHellraiser":1,"goodDog":2}}]}];

    const maxScores = { hrHellraiser: 22, dungeonMaestro: 12, trollTyrant: 20, riotConductor: 18, painAccountant: 12, hannibal: 18, comedian: 14, emotionalNuke: 14, goodDog: 22, sensitiveDog: 16, rebelDog: 18, wildDog: 10, toughDog: 14, loudDog: 6, brattyDog: 12, cravingDog: 14 };

    // --- STATE & DOM ELEMENTS ---
    let currentQuestionIndex = 0;
    let scores = {};
    const screens = { start: document.getElementById('start-screen'), quiz: document.getElementById('quiz-screen'), result: document.getElementById('result-screen') };
    const progressBar = document.getElementById('progress-bar');
    const questionHeader = document.getElementById('question-header');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');

    // --- CORE FUNCTIONS ---
    function switchScreen(screenName) {
        Object.values(screens).forEach(screen => screen.classList.remove('active'));
        screens[screenName].classList.add('active');
        window.scrollTo(0, 0);
    }

    function startQuiz() {
        currentQuestionIndex = 0;
        scores = Object.keys(personalityTypes).reduce((acc, key) => ({ ...acc, [key]: 0 }), {});
        displayQuestion();
        switchScreen('quiz');
    }

    function displayQuestion() {
        const question = questions[currentQuestionIndex];
        progressBar.style.width = `${(currentQuestionIndex / questions.length) * 100}%`;
        questionHeader.textContent = `问题 ${currentQuestionIndex + 1} / ${questions.length}`;
        questionText.textContent = question.question;
        optionsContainer.innerHTML = '';
        question.options.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.textContent = option.text;
            button.onclick = () => selectOption(option);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(option) {
        const scoresToAdd = option.scores;
        for (const typeKey in scoresToAdd) {
            if (scores.hasOwnProperty(typeKey)) {
                scores[typeKey] += scoresToAdd[typeKey];
            }
        }
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            displayQuestion();
        } else {
            progressBar.style.width = '100%';
            setTimeout(calculateAndShowResult, 500);
        }
    }

    function calculateAndShowResult() {
        const resultTypeKey = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const result = personalityTypes[resultTypeKey];
        
        document.getElementById('result-name-short').textContent = result.name;
        document.getElementById('result-acronym').textContent = result.acronym;
        document.getElementById('result-image').src = result.imageUrl;
        document.getElementById('result-type-full').textContent = `${result.name}`;
        
        const winnerScore = scores[resultTypeKey];
        const maxScoreForType = maxScores[resultTypeKey];
        const percentage = maxScoreForType > 0 ? Math.round((winnerScore / maxScoreForType) * 100) : 0;
        document.getElementById('match-percentage').textContent = `${Math.min(99, percentage)}%`;
        
        document.getElementById('result-description').textContent = result.description;
        switchScreen('result');
    }

    function restartQuiz() {
        switchScreen('start');
    }
</script>
